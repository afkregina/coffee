<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Invite for Ainne</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
        @keyframes bean-fall {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translateY(80px) scale(0.6) rotate(90deg); opacity: 0; }
        }
        .animate-bean { animation: bean-fall 0.8s ease-in forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // Custom Lucide Icon Component for CDN usage
        const Icon = ({ name, size = 24, className = "", fill = "none" }) => {
            const [svg, setSvg] = useState("");
            useEffect(() => {
                const icon = lucide.icons[name];
                if (icon) {
                    const svgString = icon.toSvg({ 
                        width: size, 
                        height: size, 
                        class: className,
                        fill: fill,
                        'stroke-width': 2
                    });
                    setSvg(svgString);
                }
            }, [name, size, className, fill]);
            return <div dangerouslySetInnerHTML={{ __html: svg }} />;
        };

        function App() {
            const [step, setStep] = useState(0);
            const [grindProgress, setGrindProgress] = useState(0);
            const [rotation, setRotation] = useState(0);
            const [beans, setBeans] = useState([]);
            const [brewProgress, setBrewProgress] = useState(0);
            const [isPouring, setIsPouring] = useState(false);
            const [audioPlayed, setAudioPlayed] = useState(false);
            const [receiptPrinting, setReceiptPrinting] = useState(false);
            const [dragY, setDragY] = useState(0);
            const [isDragging, setIsDragging] = useState(false);
            const [startY, setStartY] = useState(0);
            const [isTorn, setIsTorn] = useState(false);
            const [tearAnim, setTearAnim] = useState(false);
            
            const grinderRef = useRef(null);
            const lastAngleRef = useRef(null);
            const pourIntervalRef = useRef(null);

            const unlockAudio = () => {
                if ('speechSynthesis' in window) {
                    const silentMsg = new SpeechSynthesisUtterance('');
                    window.speechSynthesis.speak(silentMsg);
                }
                setStep(1);
            };

            const updateAngle = (x, y, isStart) => {
                if (!grinderRef.current) return;
                const rect = grinderRef.current.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                let angle = Math.atan2(y - centerY, x - centerX) * (180 / Math.PI);
                if (angle < 0) angle += 360;

                if (!isStart && lastAngleRef.current !== null) {
                    let diff = angle - lastAngleRef.current;
                    if (diff > 180) diff -= 360;
                    if (diff < -180) diff += 360;
                    setRotation(prev => prev + diff);
                    if (Math.abs(diff) > 2 && Math.random() > 0.3) {
                        setBeans(prev => [...prev.slice(-10), { id: Math.random(), offsetX: (Math.random() - 0.5) * 40 }]);
                    }
                    setGrindProgress(prev => {
                        const next = prev + Math.abs(diff) / 15;
                        if (next >= 100) { setTimeout(() => setStep(2), 800); return 100; }
                        return next;
                    });
                }
                lastAngleRef.current = angle;
            };

            const startPouring = () => {
                setIsPouring(true);
                pourIntervalRef.current = setInterval(() => {
                    setBrewProgress(p => {
                        if (p >= 100) { 
                            clearInterval(pourIntervalRef.current); 
                            setTimeout(() => setStep(3), 1000); 
                            return 100; 
                        }
                        return p + 1.5;
                    });
                }, 50);
            };

            const playBaristaAudio = () => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const msg = new SpeechSynthesisUtterance("Order for... Ah een?");
                    msg.pitch = 1.1; msg.rate = 0.9;
                    window.speechSynthesis.speak(msg);
                }
                setAudioPlayed(true);
            };

            useEffect(() => { if (step === 3 && !audioPlayed) playBaristaAudio(); }, [step]);
            useEffect(() => { if (step === 4) setTimeout(() => setReceiptPrinting(true), 500); }, [step]);

            const handleTearMove = (e) => {
                if (!isDragging) return;
                const y = (e.touches ? e.touches[0].clientY : e.clientY) - startY;
                if (y > 0) setDragY(y);
                if (y > 150) {
                    setTearAnim(true);
                    setIsDragging(false);
                    setTimeout(() => setIsTorn(true), 500);
                }
            };

            return (
                <div className="min-h-screen bg-[#EFE9E1] flex flex-col items-center justify-center p-4 text-[#4A3C31]">
                    {step === 0 && (
                        <div className="text-center space-y-6">
                            <div className="w-20 h-20 bg-[#D9C8B4] rounded-full flex items-center justify-center mx-auto shadow-inner">
                                <Icon name="coffee" size={40} className="text-[#5C4D42]" />
                            </div>
                            <h1 className="text-3xl font-serif font-bold text-[#3E2723]">Hey there.</h1>
                            <p className="text-lg">I think we're overdue for a work session. Let's brew some coffee first.</p>
                            <button onClick={unlockAudio} className="bg-[#5C4D42] text-white px-8 py-3 rounded-full font-bold shadow-lg">Let's brew ☕️</button>
                        </div>
                    )}

                    {step === 1 && (
                        <div className="flex flex-col items-center space-y-8 w-full max-w-sm">
                            <h2 className="text-2xl font-serif font-bold text-center">Step 1: Grind the beans</h2>
                            <div 
                                ref={grinderRef}
                                className="relative w-64 h-64 bg-[#D9C8B4] rounded-full border-8 border-[#C3B099] flex items-center justify-center cursor-pointer touch-none"
                                onMouseDown={(e) => { lastAngleRef.current = null; updateAngle(e.clientX, e.clientY, true); }}
                                onMouseMove={(e) => updateAngle(e.clientX, e.clientY, false)}
                                onMouseUp={() => lastAngleRef.current = null}
                                onTouchMove={(e) => updateAngle(e.touches[0].clientX, e.touches[0].clientY, false)}
                            >
                                <div className="absolute w-24 h-24 bg-[#8B7355] rounded-full shadow-md" />
                                <div className="absolute w-full h-full" style={{ transform: `rotate(${rotation}deg)` }}>
                                    <div className="absolute top-1/2 left-1/2 w-28 h-4 bg-[#5C4D42] origin-left -translate-y-1/2 rounded-full" />
                                    <div className="absolute top-1/2 left-[calc(50%+6.5rem)] w-10 h-10 bg-[#3E2723] rounded-full -translate-y-1/2 -translate-x-1/2 border-2 border-[#5C4D42]" />
                                </div>
                            </div>
                            <div className="absolute bottom-20 w-16 h-16 flex justify-center">
                                {beans.map(b => <div key={b.id} className="absolute w-2 h-3 bg-[#3E2723] rounded-full animate-bean" style={{ left: `calc(50% + ${b.offsetX}px)` }} />)}
                            </div>
                            <div className="w-full bg-[#D9C8B4] h-2 rounded-full overflow-hidden">
                                <div className="bg-[#5C4D42] h-full transition-all" style={{ width: `${grindProgress}%` }} />
                            </div>
                        </div>
                    )}

                    {step === 2 && (
                        <div className="flex flex-col items-center space-y-8">
                            <h2 className="text-2xl font-serif font-bold">Step 2: The Pour Over</h2>
                            <div className="relative w-32 h-48 flex flex-col items-end justify-end">
                                <div className={`w-2 bg-blue-300 absolute top-0 left-1/2 -translate-x-1/2 transition-opacity ${isPouring ? 'opacity-100 h-24' : 'opacity-0 h-0'}`} />
                                <div className="w-28 h-20 bg-white rounded-b-3xl shadow-md border-b-4 border-gray-200 overflow-hidden relative">
                                    <div className="absolute -right-6 top-4 w-8 h-10 border-4 border-white rounded-r-xl" />
                                    <div className="bg-[#3E2723] w-full absolute bottom-0 transition-all" style={{ height: `${brewProgress}%` }} />
                                </div>
                            </div>
                            <button 
                                onMouseDown={startPouring} onMouseUp={() => setIsPouring(false)}
                                onTouchStart={(e) => { e.preventDefault(); startPouring(); }} onTouchEnd={() => setIsPouring(false)}
                                className="bg-[#5C4D42] text-white px-8 py-4 rounded-full font-bold shadow-lg"
                            >Hold to Pour</button>
                        </div>
                    )}

                    {step === 3 && (
                        <div className="text-center space-y-6">
                            <div className="bg-white p-8 rounded-[2rem] shadow-xl relative border-2 border-[#D9C8B4]">
                                <p className="text-3xl font-serif font-bold">"Order for... <br/><span className="italic text-[#8B7355]">Ainne?</span>"</p>
                                <div className="absolute -bottom-4 left-1/2 w-8 h-8 bg-white border-b-2 border-r-2 border-[#D9C8B4] transform -translate-x-1/2 rotate-45"></div>
                            </div>
                            <button onClick={() => setStep(4)} className="bg-[#5C4D42] text-white px-10 py-4 rounded-full font-bold shadow-xl text-xl">That's me!</button>
                        </div>
                    )}

                    {step === 4 && (
                        <div className="relative w-full max-w-xs flex flex-col items-center h-[500px]" onMouseMove={handleTearMove} onTouchMove={handleTearMove}>
                            <div className="absolute top-24 w-48 h-64 bg-white rounded-b-3xl shadow-xl border-2 border-gray-200 flex flex-col items-center pt-16">
                                <div className="w-full h-20 bg-[#C89B7B] transform -rotate-2 flex items-center justify-center border-y border-[#a67b5c]">
                                    <span className="text-4xl font-bold opacity-80" style={{ fontFamily: 'cursive' }}>Ainne</span>
                                </div>
                            </div>
                            {!isTorn && (
                                <div 
                                    className={`absolute top-12 w-64 bg-white p-6 shadow-2xl border cursor-pointer z-10 transition-transform ${tearAnim ? 'translate-y-[500px] opacity-0 duration-500' : ''}`}
                                    style={{ transform: tearAnim ? undefined : `translateY(${dragY}px) rotate(${dragY * 0.05}deg)` }}
                                    onMouseDown={(e) => { setIsDragging(true); setStartY(e.clientY); }}
                                    onMouseUp={() => setIsDragging(false)}
                                    onTouchStart={(e) => { setIsDragging(true); setStartY(e.touches[0].clientY); }}
                                    onTouchEnd={() => setIsDragging(false)}
                                >
                                    <div className="text-center border-b border-dashed border-gray-300 pb-4 mb-4">
                                        <h2 className="font-bold tracking-widest">COWORKING</h2>
                                    </div>
                                    <div className="space-y-2 text-sm font-mono">
                                        <div className="flex justify-between"><span>DATE</span><span className="font-bold">MARCH 23</span></div>
                                        <div className="flex justify-between"><span>TOTAL</span><span className="font-bold">MY TREAT</span></div>
                                    </div>
                                    <p className="text-center mt-6 text-xs text-gray-400">Tear down to accept!</p>
                                </div>
                            )}
                            {isTorn && (
                                <button onClick={() => setStep(5)} className="absolute bottom-0 bg-[#3E2723] text-white px-10 py-4 rounded-full font-bold shadow-2xl text-xl">Hell Yes!</button>
                            )}
                        </div>
                    )}

                    {step === 5 && (
                        <div className="text-center space-y-6">
                            <Icon name="heart" size={72} fill="#ef4444" className="text-red-500 mx-auto animate-bounce" />
                            <h2 className="text-4xl font-serif font-bold">Yay! 🎉</h2>
                            <p className="text-xl">It's on the calendar. March 23.</p>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
