<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Invite for Ainne</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #EFE9E1;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
        }
        .font-serif { font-family: 'Playfair Display', serif; }

        @keyframes bean-fall {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translateY(80px) scale(0.6) rotate(90deg); opacity: 0; }
        }
        .animate-bean { animation: bean-fall 0.8s ease-in forwards; }
        
        /* Smooth Tear Animation */
        @keyframes tear-fall {
            0% { transform: translateY(var(--drag-y)) rotate(0deg); opacity: 1; }
            100% { transform: translateY(600px) rotate(20deg); opacity: 0; }
        }
        .tear-away {
            animation: tear-fall 0.6s cubic-bezier(0.45, 0, 0.55, 1) forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 24, className = "", fill = "none" }) => {
            const [svg, setSvg] = useState("");
            useEffect(() => {
                const icon = lucide.icons[name];
                if (icon) {
                    setSvg(icon.toSvg({ width: size, height: size, class: className, fill: fill, 'stroke-width': 2 }));
                }
            }, [name, size, className, fill]);
            return <div dangerouslySetInnerHTML={{ __html: svg }} className="flex items-center justify-center" />;
        };

        function App() {
            const [step, setStep] = useState(0); 
            const [grindProgress, setGrindProgress] = useState(0);
            const [rotation, setRotation] = useState(0);
            const [beans, setBeans] = useState([]);
            const [brewProgress, setBrewProgress] = useState(0);
            const [isPouring, setIsPouring] = useState(false);
            const [receiptPrinting, setReceiptPrinting] = useState(false);
            const [dragY, setDragY] = useState(0);
            const [isDragging, setIsDragging] = useState(false);
            const [startY, setStartY] = useState(0);
            const [isTorn, setIsTorn] = useState(false);
            const [isTearing, setIsTearing] = useState(false);

            const grinderRef = useRef(null);
            const lastAngleRef = useRef(null);
            const pourIntervalRef = useRef(null);

            // --- GRINDER ---
            const handleGrind = (clientX, clientY, isStart) => {
                if (grindProgress >= 100 || !grinderRef.current) return;
                const rect = grinderRef.current.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                let angle = Math.atan2(clientY - centerY, clientX - centerX) * (180 / Math.PI);
                if (angle < 0) angle += 360;

                if (!isStart && lastAngleRef.current !== null) {
                    let diff = angle - lastAngleRef.current;
                    if (diff > 180) diff -= 360;
                    if (diff < -180) diff += 360;
                    setRotation(prev => prev + diff);
                    if (Math.abs(diff) > 2 && Math.random() > 0.3) {
                        setBeans(prev => [...prev.slice(-10), { id: Math.random(), x: (Math.random() - 0.5) * 40 }]);
                    }
                    setGrindProgress(prev => {
                        const next = prev + Math.abs(diff) / 15;
                        if (next >= 100) { setTimeout(() => setStep(2), 800); return 100; }
                        return next;
                    });
                }
                lastAngleRef.current = angle;
            };

            // --- BREWER ---
            const startPouring = () => {
                setIsPouring(true);
                pourIntervalRef.current = setInterval(() => {
                    setBrewProgress(p => {
                        if (p >= 100) { clearInterval(pourIntervalRef.current); setTimeout(() => setStep(3), 1000); return 100; }
                        return p + 1.5;
                    });
                }, 50);
            };

            // --- TEAR LOGIC ---
            useEffect(() => { if (step === 4) setTimeout(() => setReceiptPrinting(true), 500); }, [step]);

            const onTearStart = (clientY) => {
                if (isTorn || !receiptPrinting) return;
                setIsDragging(true);
                setStartY(clientY);
            };

            const onTearMove = (clientY) => {
                if (!isDragging) return;
                const delta = clientY - startY;
                if (delta > 0) setDragY(delta);
                if (delta > 160) {
                    setIsTearing(true);
                    setIsDragging(false);
                    setTimeout(() => setIsTorn(true), 600);
                }
            };

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4">
                    
                    {step === 0 && (
                        <div className="text-center space-y-6 animate-in fade-in duration-700">
                            <div className="w-20 h-20 bg-[#D9C8B4] rounded-full flex items-center justify-center mx-auto shadow-inner">
                                <Icon name="Coffee" size={40} className="text-[#5C4D42]" />
                            </div>
                            <h1 className="text-3xl font-serif font-bold text-[#3E2723]">Hey Ainne!</h1>
                            <p className="text-lg text-[#6D4C41]">It's time for a brew and a work session.</p>
                            <button onClick={() => setStep(1)} className="bg-[#5C4D42] text-white px-8 py-3 rounded-full text-lg font-bold shadow-lg hover:scale-105 transition-all">Let's start ☕️</button>
                        </div>
                    )}

                    {step === 1 && (
                        <div className="flex flex-col items-center space-y-8 w-full max-w-sm">
                            <h2 className="text-2xl font-serif font-bold">1. Grind the beans</h2>
                            <div 
                                ref={grinderRef}
                                className="relative w-64 h-64 bg-[#D9C8B4] rounded-full border-8 border-[#C3B099] flex items-center justify-center touch-none cursor-pointer"
                                onMouseDown={(e) => handleGrind(e.clientX, e.clientY, true)}
                                onMouseMove={(e) => handleGrind(e.clientX, e.clientY, false)}
                                onMouseUp={() => lastAngleRef.current = null}
                                onTouchStart={(e) => handleGrind(e.touches[0].clientX, e.touches[0].clientY, true)}
                                onTouchMove={(e) => handleGrind(e.touches[0].clientX, e.touches[0].clientY, false)}
                            >
                                <div className="absolute w-full h-full" style={{ transform: `rotate(${rotation}deg)` }}>
                                    <div className="absolute top-1/2 left-1/2 w-28 h-4 bg-[#5C4D42] origin-left -translate-y-1/2 rounded-full" />
                                    <div className="absolute top-1/2 left-[calc(50%+6.5rem)] w-10 h-10 bg-[#3E2723] rounded-full -translate-y-1/2 -translate-x-1/2" />
                                </div>
                                <div className="w-20 h-20 bg-[#8B7355] rounded-full shadow-md" />
                            </div>
                            <div className="absolute bottom-20 flex justify-center w-full">
                                {beans.map(b => <div key={b.id} className="absolute w-2 h-3 bg-[#3E2723] rounded-full animate-bean" style={{ left: `calc(50% + ${b.x}px)` }} />)}
                            </div>
                            <div className="w-full bg-[#D9C8B4] h-3 rounded-full overflow-hidden">
                                <div className="h-full bg-[#5C4D42] transition-all" style={{ width: `${grindProgress}%` }} />
                            </div>
                        </div>
                    )}

                    {step === 2 && (
                        <div className="flex flex-col items-center space-y-8 animate-in fade-in">
                            <h2 className="text-2xl font-serif font-bold">2. The Pour Over</h2>
                            <div className="relative w-32 h-48 flex flex-col items-center justify-end">
                                <div className={`w-2 bg-blue-300 absolute top-0 transition-all ${isPouring ? 'h-24 opacity-60' : 'h-0 opacity-0'}`} />
                                <div className="w-28 h-24 bg-white rounded-b-3xl shadow-md border-b-4 border-gray-200 overflow-hidden relative">
                                    <div className="absolute -right-6 top-4 w-8 h-10 border-4 border-white rounded-r-xl" />
                                    <div className="bg-[#3E2723] w-full absolute bottom-0 transition-all" style={{ height: `${brewProgress}%` }} />
                                </div>
                            </div>
                            <button 
                                onMouseDown={startPouring} onMouseUp={() => setIsPouring(false)} onTouchStart={(e) => { e.preventDefault(); startPouring(); }} onTouchEnd={() => setIsPouring(false)}
                                className={`px-10 py-4 rounded-full font-bold text-white shadow-xl ${brewProgress >= 100 ? 'bg-green-600' : 'bg-[#5C4D42]'}`}
                            >{brewProgress >= 100 ? "Ready!" : "Hold to Pour"}</button>
                        </div>
                    )}

                    {step === 3 && (
                        <div className="text-center space-y-8 animate-in zoom-in">
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-2xl relative border-2 border-[#D9C8B4]">
                                <p className="text-3xl font-serif font-bold">"Order for... <br/><span className="italic text-[#8B7355]">Ainne?</span>"</p>
                                <div className="absolute -bottom-4 left-1/2 w-8 h-8 bg-white border-b-2 border-r-2 border-[#D9C8B4] transform -translate-x-1/2 rotate-45" />
                            </div>
                            <button onClick={() => setStep(4)} className="bg-[#5C4D42] text-white px-10 py-4 rounded-full font-bold shadow-xl text-xl hover:scale-105 transition-all">That's me!</button>
                        </div>
                    )}

                    {step === 4 && (
                        <div 
                            className="relative w-full max-w-xs flex flex-col items-center h-[550px] touch-none"
                            onMouseMove={(e) => onTearMove(e.clientY)}
                            onTouchMove={(e) => onTearMove(e.touches[0].clientY)}
                            onMouseUp={() => setIsDragging(false)}
                            onTouchEnd={() => setIsDragging(false)}
                        >
                            <div className="text-center mb-6 z-20">
                                <h2 className="font-serif font-bold text-xl animate-pulse">Drag receipt down to reveal</h2>
                            </div>

                            {/* Cup Underneath */}
                            <div className="absolute top-32 flex flex-col items-center animate-in fade-in duration-1000">
                                <div className="relative w-48 h-64 bg-white rounded-b-[3rem] shadow-2xl border-2 border-gray-100 flex flex-col items-center pt-16">
                                    <div className="absolute -top-3 w-[105%] h-8 bg-gray-50 rounded-t-2xl border border-gray-200 shadow-sm" />
                                    <div className="w-full h-24 bg-[#C89B7B] transform -rotate-2 flex items-center justify-center border-y border-[#a67b5c] shadow-inner">
                                        <span className="text-4xl font-bold opacity-70 italic" style={{ fontFamily: 'cursive' }}>Ainne</span>
                                    </div>
                                </div>
                            </div>

                            {/* Tearable Receipt */}
                            {!isTorn && (
                                <div 
                                    className={`absolute top-16 w-64 z-30 transition-transform ${isTearing ? 'tear-away' : ''}`}
                                    style={{ '--drag-y': `${dragY}px`, transform: isTearing ? undefined : `translateY(${dragY}px) rotate(${dragY * 0.03}deg)` }}
                                    onMouseDown={(e) => onTearStart(e.clientY)}
                                    onTouchStart={(e) => onTearStart(e.touches[0].clientY)}
                                >
                                    <div className={`bg-white p-6 shadow-2xl border border-gray-100 font-mono text-gray-800 transform transition-opacity duration-1000 ${receiptPrinting ? 'opacity-100 scale-100' : 'opacity-0 scale-95'}`}>
                                        <div className="text-center border-b border-dashed border-gray-300 pb-4 mb-4">
                                            <h3 className="font-bold tracking-widest uppercase">Coworking</h3>
                                        </div>
                                        <div className="space-y-3 text-sm">
                                            <div className="flex justify-between"><span>DATE</span><span className="font-bold">MARCH 23</span></div>
                                            <div className="flex justify-between"><span>GUEST</span><span>AINNE</span></div>
                                            <div className="border-t border-dashed border-gray-300 pt-3 flex justify-between font-bold text-lg">
                                                <span>TOTAL</span><span>$0.00</span>
                                            </div>
                                        </div>
                                        <p className="text-center mt-8 text-[10px] text-gray-400">TEAR TO ACCEPT</p>
                                        <div className="absolute bottom-0 left-0 w-full h-2 bg-repeat-x flex" style={{ backgroundSize: '10px 10px', backgroundImage: 'radial-gradient(circle at 5px 10px, transparent 5px, white 5.5px)' }} />
                                    </div>
                                </div>
                            )}

                            {isTorn && (
                                <div className="absolute bottom-0 w-full flex justify-center animate-in zoom-in duration-500">
                                    <button onClick={() => setStep(5)} className="bg-[#3E2723] text-white px-10 py-5 rounded-full text-2xl font-bold shadow-2xl hover:scale-105 transition-all">Hell Yes! 🎉</button>
                                </div>
                            )}
                        </div>
                    )}

                    {step === 5 && (
                        <div className="text-center space-y-8 animate-in zoom-in">
                            <Icon name="Heart" size={80} fill="#ef4444" className="text-red-500 mx-auto animate-bounce" />
                            <h2 className="text-5xl font-serif font-bold text-[#3E2723]">Yay!</h2>
                            <p className="text-xl text-[#6D4C41]">Mark your calendar for <span className="font-bold">March 23</span>.</p>
                            <p className="text-sm text-gray-400 italic">Screenshot this and send it over!</p>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Helper component to render Lucide icons from the CDN
        const Icon = ({ name, size = 24, className = "", fill = "none" }) => {
            const [svgContent, setSvgContent] = useState("");
            useEffect(() => {
                const icon = lucide.icons[name];
                if (icon) {
                    const svg = icon.toSvg({
                        width: size,
                        height: size,
                        class: className,
                        fill: fill,
                        'stroke-width': 2
                    });
                    setSvgContent(svg);
                }
            }, [name, size, className, fill]);
            return <div dangerouslySetInnerHTML={{ __html: svgContent }} className="flex items-center justify-center" />;
        };

        function App() {
            const [step, setStep] = useState(0); 
            const [grindProgress, setGrindProgress] = useState(0);
            const [rotation, setRotation] = useState(0);
            const [beans, setBeans] = useState([]);
            const grinderRef = useRef(null);
            const lastAngleRef = useRef(null);

            const [brewProgress, setBrewProgress] = useState(0);
            const [isPouring, setIsPouring] = useState(false);
            const pourIntervalRef = useRef(null);

            const [audioPlayed, setAudioPlayed] = useState(false);
            const [receiptPrinting, setReceiptPrinting] = useState(false);
            const [dragY, setDragY] = useState(0);
            const [isDragging, setIsDragging] = useState(false);
            const [startY, setStartY] = useState(0);
            const [isTorn, setIsTorn] = useState(false);
            const [tearAnim, setTearAnim] = useState(false);

            // Audio Unlock & Step Transition
            const unlockAudio = () => {
                if ('speechSynthesis' in window) {
                    const silentMsg = new SpeechSynthesisUtterance('');
                    window.speechSynthesis.speak(silentMsg);
                }
                setStep(1);
            };

            // Grinder Logic
            const handleGrindStart = (e) => {
                if (grindProgress >= 100) return;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                updateAngle(clientX, clientY, true);
            };

            const handleGrindMove = (e) => {
                if (grindProgress >= 100 || lastAngleRef.current === null) return;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                updateAngle(clientX, clientY, false);
            };

            const updateAngle = (x, y, isStart) => {
                if (!grinderRef.current) return;
                const rect = grinderRef.current.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                let angle = Math.atan2(y - centerY, x - centerX) * (180 / Math.PI);
                if (angle < 0) angle += 360;

                if (!isStart && lastAngleRef.current !== null) {
                    let diff = angle - lastAngleRef.current;
                    if (diff > 180) diff -= 360;
                    if (diff < -180) diff += 360;
                    setRotation(prev => prev + diff);
                    
                    const absDiff = Math.abs(diff);
                    if (absDiff > 2 && Math.random() > 0.3) {
                        setBeans(prev => [...prev.slice(-15), { id: Math.random(), offsetX: (Math.random() - 0.5) * 40 }]);
                    }
                    setGrindProgress(prev => {
                        const next = prev + absDiff / 15;
                        if (next >= 100) { setTimeout(() => setStep(2), 1000); return 100; }
                        return next;
                    });
                }
                lastAngleRef.current = angle;
            };

            // Brewer Logic
            const startPouring = () => {
                if (brewProgress >= 100) return;
                setIsPouring(true);
                pourIntervalRef.current = setInterval(() => {
                    setBrewProgress(prev => {
                        const next = prev + 1.5;
                        if (next >= 100) {
                            clearInterval(pourIntervalRef.current);
                            setTimeout(() => setStep(3), 1500);
                            return 100;
                        }
                        return next;
                    });
                }, 50);
            };

            const stopPouring = () => {
                setIsPouring(false);
                if (pourIntervalRef.current) clearInterval(pourIntervalRef.current);
            };

            // Barista Audio Logic
            const playBaristaAudio = () => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    // Phonetic spelling "Ah-een" for correct pronunciation
                    const msg = new SpeechSynthesisUtterance("Order for... Ah een?");
                    msg.pitch = 1.1; msg.rate = 0.9;
                    window.speechSynthesis.speak(msg);
                }
                setAudioPlayed(true);
            };

            useEffect(() => { if (step === 3 && !audioPlayed) playBaristaAudio(); }, [step, audioPlayed]);
            useEffect(() => { if (step === 4) setTimeout(() => setReceiptPrinting(true), 500); }, [step]);

            // Receipt Tear Logic
            const handleTearStart = (e) => {
                if (isTorn || !receiptPrinting) return;
                setIsDragging(true);
                setStartY(e.touches ? e.touches[0].clientY : e.clientY);
            };

            const handleTearMove = (e) => {
                if (!isDragging || isTorn) return;
                const currentY = e.touches ? e.touches[0].clientY : e.clientY;
                const deltaY = currentY - startY;
                if (deltaY > 0) setDragY(deltaY);
                if (deltaY > 150) {
                    setTearAnim(true);
                    setIsDragging(false);
                    setTimeout(() => { setIsTorn(true); setDragY(0); }, 500);
                }
            };

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4">
                    {/* Welcome Screen */}
                    {step === 0 && (
                        <div className="max-w-sm w-full text-center space-y-6 animate-in fade-in duration-700">
                            <div className="w-20 h-20 bg-[#D9C8B4] rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner">
                                <Icon name="Coffee" size={40} className="text-[#5C4D42]" />
                            </div>
                            <h1 className="text-3xl font-serif font-bold text-[#3E2723]">Hey there.</h1>
                            <p className="text-lg text-[#6D4C41]">I think we're overdue for a good work session. But first, we need to make some coffee...</p>
                            <button onClick={unlockAudio} className="mt-8 bg-[#5C4D42] text-white px-8 py-3 rounded-full text-lg font-medium shadow-md transition-transform hover:-translate-y-1">
                                Let's brew ☕️
                            </button>
                        </div>
                    )}

                    {/* Grinder Step */}
                    {step === 1 && (
                        <div className="max-w-sm w-full flex flex-col items-center space-y-8 animate-in fade-in duration-500">
                            <div className="text-center space-y-2">
                                <h2 className="text-2xl font-serif font-bold">Step 1: Grind the beans</h2>
                                <p className="text-[#6D4C41] text-sm">Spin the crank with your finger!</p>
                            </div>
                            <div className="relative flex flex-col items-center pb-8">
                                <div 
                                    ref={grinderRef}
                                    className="relative z-10 w-64 h-64 bg-[#D9C8B4] rounded-full shadow-inner flex items-center justify-center cursor-pointer border-8 border-[#C3B099] touch-none"
                                    onMouseDown={handleGrindStart}
                                    onMouseMove={handleGrindMove}
                                    onMouseUp={() => lastAngleRef.current = null}
                                    onMouseLeave={() => lastAngleRef.current = null}
                                    onTouchStart={handleGrindStart}
                                    onTouchMove={handleGrindMove}
                                    onTouchEnd={() => lastAngleRef.current = null}
                                >
                                    <div className="absolute w-24 h-24 bg-[#8B7355] rounded-full shadow-md flex items-center justify-center">
                                        <div className="w-8 h-8 bg-[#5C4D42] rounded-full" />
                                    </div>
                                    <div className="absolute w-full h-full pointer-events-none transition-transform duration-75 ease-out" style={{ transform: `rotate(${rotation}deg)` }}>
                                        <div className="absolute top-1/2 left-1/2 w-28 h-4 bg-[#5C4D42] origin-left -translate-y-1/2 rounded-full shadow-md" />
                                        <div className="absolute top-1/2 left-[calc(50%+6.5rem)] w-10 h-10 bg-[#3E2723] rounded-full -translate-y-1/2 -translate-x-1/2 shadow-lg border-2 border-[#5C4D42]" />
                                    </div>
                                </div>
                                <div className="absolute bottom-0 w-16 h-16 flex justify-center z-0">
                                    {beans.map(bean => (
                                        <div key={bean.id} className="absolute w-2 h-3 bg-[#3E2723] rounded-full animate-bean shadow-sm" style={{ left: `calc(50% + ${bean.offsetX}px)` }} />
                                    ))}
                                </div>
                            </div>
                            <div className="w-full max-w-xs h-3 bg-[#D9C8B4] rounded-full overflow-hidden">
                                <div className="h-full bg-[#5C4D42] transition-all" style={{ width: `${grindProgress}%` }} />
                            </div>
                        </div>
                    )}

                    {/* Brewer Step */}
                    {step === 2 && (
                        <div className="max-w-sm w-full flex flex-col items-center space-y-8 animate-in fade-in duration-500">
                            <h2 className="text-2xl font-serif font-bold text-center">Step 2: The Pour Over</h2>
                            <div className="relative w-48 h-64 flex flex-col items-center justify-end pb-4">
                                <div className={`absolute top-0 w-2 bg-blue-300/60 transition-all duration-300 ${isPouring ? 'h-32 opacity-100' : 'h-0 opacity-0'} rounded-b-full`} />
                                <div className="relative z-10 w-32 h-24 bg-white/50 backdrop-blur-sm border-2 border-white rounded-b-[3rem] rounded-t-lg shadow-sm flex flex-col items-center justify-end overflow-hidden mb-2">
                                    <div className="w-full bg-[#5C4D42] transition-all duration-300" style={{ height: `${20 + (brewProgress * 0.4)}%` }} />
                                </div>
                                <div className="relative w-full h-8 flex justify-center mb-2">
                                    {(isPouring || brewProgress > 0) && brewProgress < 100 && <Icon name="Droplets" size={24} className="text-[#3E2723] animate-bounce" />}
                                </div>
                                <div className="relative w-28 h-24 bg-white rounded-b-3xl rounded-t-md shadow-md border-b-4 border-gray-200 overflow-hidden flex items-end">
                                    <div className="absolute -right-6 top-4 w-8 h-12 border-4 border-white rounded-r-xl" />
                                    <div className="w-full bg-[#3E2723] transition-all duration-300" style={{ height: `${brewProgress}%` }} />
                                </div>
                            </div>
                            <button 
                                className={`px-8 py-4 rounded-full font-medium text-white shadow-lg touch-manipulation flex items-center gap-2 ${brewProgress >= 100 ? 'bg-green-600' : isPouring ? 'bg-blue-500' : 'bg-[#5C4D42]'}`}
                                onMouseDown={startPouring} onMouseUp={stopPouring} onMouseLeave={stopPouring}
                                onTouchStart={(e) => { e.preventDefault(); startPouring(); }} onTouchEnd={(e) => { e.preventDefault(); stopPouring(); }}
                            >
                                {brewProgress >= 100 ? "Brewed!" : "Hold to Pour"}
                            </button>
                        </div>
                    )}

                    {/* Barista Step */}
                    {step === 3 && (
                        <div className="max-w-md w-full flex flex-col items-center animate-in zoom-in duration-500">
                            <div className="bg-white rounded-[2rem] p-8 shadow-xl mb-6 relative border-2 border-[#D9C8B4] max-w-[280px]">
                                <p className="text-3xl font-serif font-bold text-[#3E2723] text-center leading-tight">
                                    "Order for... <br/><span className="italic text-[#8B7355]">Ainne?</span>"
                                </p>
                                <div className="absolute -bottom-4 left-1/2 w-8 h-8 bg-white border-b-2 border-r-2 border-[#D9C8B4] transform -translate-x-1/2 rotate-45"></div>
                            </div>
                            <button onClick={playBaristaAudio} className="mb-8 text-[#8B7355] flex items-center gap-2 bg-white/50 px-4 py-2 rounded-full text-sm font-medium">
                                <Icon name="Volume2" size={16} /> Replay Audio
                            </button>
                            <button onClick={() => setStep(4)} className="bg-[#5C4D42] text-white px-8 py-4 rounded-full text-xl font-bold shadow-lg transform hover:-translate-y-1 transition-all">
                                That's me! 🙋‍♀️
                            </button>
                        </div>
                    )}

                    {/* Tear Step */}
                    {step === 4 && (
                        <div className="max-w-md w-full h-[500px] flex flex-col items-center relative select-none touch-none" onMouseMove={handleTearMove} onTouchMove={handleTearMove} onMouseUp={() => setIsDragging(false)} onTouchEnd={() => setIsDragging(false)}>
                            <div className="text-center mb-4 z-20">
                                <h2 className="font-serif font-bold text-xl text-[#3E2723] animate-pulse">Drag receipt down to tear</h2>
                            </div>
                            {/* Coffee Cup Background */}
                            <div className="absolute top-24 z-0 animate-in fade-in duration-1000 delay-500 flex flex-col items-center">
                                <div className="relative w-48 h-64 bg-[#f8f5f0] rounded-b-[2.5rem] rounded-t-lg shadow-xl border-2 border-gray-200 flex flex-col items-center">
                                    <div className="absolute -top-3 w-[105%] h-8 bg-gray-100 rounded-t-2xl shadow-sm border border-gray-300" />
                                    <div className="absolute top-1/4 w-[102%] h-24 bg-[#C89B7B] shadow-sm transform -rotate-3 flex items-center justify-center border-y border-[#a67b5c]">
                                        <span className="text-4xl text-gray-800 font-bold opacity-80" style={{ fontFamily: 'cursive', transform: 'rotate(-5deg)' }}>Ainne</span>
                                    </div>
                                </div>
                            </div>
                            {/* Tearable Receipt */}
                            {!isTorn && (
                                <div 
                                    className={`absolute top-12 w-64 pt-2 z-10 cursor-grab active:cursor-grabbing transition-transform ${tearAnim ? 'translate-y-[500px] opacity-0 duration-500' : ''}`}
                                    style={{ transform: tearAnim ? undefined : `translateY(${dragY}px) rotate(${dragY * 0.05}deg)` }}
                                    onMouseDown={handleTearStart} onTouchStart={handleTearStart}
                                >
                                    <div className={`bg-white text-gray-800 font-mono p-6 shadow-2xl border border-gray-200 transition-opacity duration-1000 ${receiptPrinting ? 'opacity-100' : 'opacity-0'}`}>
                                        <div className="text-center border-b-2 border-dashed border-gray-300 pb-4 mb-4">
                                            <h2 className="font-bold text-xl tracking-widest uppercase">Coworking</h2>
                                        </div>
                                        <div className="space-y-3 text-sm">
                                            <div className="flex justify-between"><span>DATE</span><span className="font-bold bg-yellow-200">MARCH 23</span></div>
                                            <div className="border-t border-dashed border-gray-300 pt-3 mt-3">
                                                <p className="font-bold mb-2 uppercase">Order:</p>
                                                <div className="flex justify-between"><span>1x Perfect Day</span><span>$0.00</span></div>
                                            </div>
                                            <div className="border-t border-b border-dashed border-gray-300 py-3 my-3">
                                                <div className="flex justify-between font-bold text-lg"><span>TOTAL</span><span>MY TREAT</span></div>
                                            </div>
                                        </div>
                                        <p className="text-center mt-6 text-xs text-gray-400">Tear to accept!</p>
                                        <div className="absolute bottom-0 left-0 w-full h-2 bg-repeat-x" style={{ backgroundSize: '10px 10px', backgroundImage: 'radial-gradient(circle at 5px 10px, transparent 5px, white 5.5px)' }}></div>
                                    </div>
                                </div>
                            )}
                            {isTorn && (
                                <div className="absolute bottom-0 w-full flex justify-center animate-in zoom-in">
                                    <button onClick={() => setStep(5)} className="bg-[#3E2723] text-white px-10 py-4 rounded-full text-xl font-bold shadow-2xl transition-all hover:scale-105">Hell Yes! ✨</button>
                                </div>
                            )}
                        </div>
                    )}

                    {/* Celebration Screen */}
                    {step === 5 && (
                        <div className="max-w-sm w-full text-center space-y-6 animate-in zoom-in duration-500">
                            <Icon name="Heart" size={72} fill="#ef4444" className="text-red-500 mx-auto animate-bounce" />
                            <h2 className="text-4xl font-serif font-bold text-[#3E2723]">Yay! 🎉</h2>
                            <p className="text-xl text-[#6D4C41]">It's officially on the calendar.</p>
                            <div className="bg-white p-4 rounded-2xl shadow-sm border border-[#D9C8B4] inline-block mt-4 text-left">
                                <div className="flex items-center gap-3 text-[#5C4D42]">
                                    <Icon name="Calendar" size={20} />
                                    <span className="font-medium text-lg">March 23</span>
                                </div>
                            </div>
                            <p className="text-[#8B7355] mt-8">Screenshot this and send it to me!<br/> Let me know what time works best.</p>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
